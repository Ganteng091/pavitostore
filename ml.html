<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Mobile Legends</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* BANNER IKLAN */
.banner {
  width: 100%;
  max-height: 200px;
  overflow: hidden;
}

.banner img {
  width: 100%;
  object-fit: cover;
}

/* BACK BUTTON */
.back-btn {
  display: inline-block;
  margin: 10px;
  padding: 8px 15px;
  background: #111;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  box-shadow: 0 0 10px #0ff;
}

/* DIAMOND GRID */
.diamond-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* CARD */
.diamond-card {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 0 10px #0ff;
  transition: 0.3s;
}

.diamond-card span {
  color: orange;
  font-weight: bold;
}

.diamond-card:hover {
  transform: scale(1.05);
}

.diamond-card.active {
  border: 2px solid #0ff;
  box-shadow: 0 0 20px #0ff;
}

/* BUTTON */
.btn {
  padding: 10px 20px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #0ff, #a0f);
  color: white;
  cursor: pointer;
}

/* FORM */
.form-box {
  display: none;
  margin-top: 20px;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  width: 80%;
  max-width: 250px;
}

/* PAYMENT */
.payment span {
  display: inline-block;
  margin: 5px;
  padding: 8px 15px;
  background: #111;
  border-radius: 8px;
  box-shadow: 0 0 10px #0ff;
}

/* RESPONSIVE KHUSUS HP */
@media (max-width: 600px) {
  h2 {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <img src="iklan.png" alt="Iklan">
</div>

<a href="topup.html" class="back-btn">Kembali</a>

<h2>Top Up Mobile Legends By pavito store</h2>

<!-- DIAMOND -->
<div class="diamond-container">

<div class="diamond-card" onclick="pilihDiamond('3 Diamond',1171)">
<p>3 Diamond</p><span>Rp 1.171</span></div>

<div class="diamond-card" onclick="pilihDiamond('5 Diamond',1423)">
<p>5 Diamond</p><span>Rp 1.423</span></div>

<div class="diamond-card" onclick="pilihDiamond('12 Diamond',3323)">
<p>12 Diamond</p><span>Rp 3.323</span></div>

<div class="diamond-card" onclick="pilihDiamond('19 Diamond',5223)">
<p>19 Diamond</p><span>Rp 5.223</span></div>

</div>

<button onclick="bukaForm()" class="btn">Checkout</button>

<!-- FORM -->
<div class="form-box" id="formBox">

<h3>Data Akun</h3>
<input type="text" id="id" placeholder="Masukkan ID"><br>
<input type="text" id="server" placeholder="ID Server"><br>
<input type="text" id="nick" placeholder="Nickname"><br>

<h3>Metode Pembayaran</h3>
<div class="payment">
<span>GoPay</span>
<span>OVO</span>
<span>DANA</span>
<span>PayPal</span>
</div>

<h3>Ringkasan</h3>
<p>Item: <span id="item">-</span></p>
<p>Total: <span id="total">IDR 0</span></p>

<button onclick="kirimWA()" class="btn">Beli Sekarang</button>

</div>

<script>
let selectedDiamond = "";
let selectedHarga = 0;

function pilihDiamond(nama, harga){
  selectedDiamond = nama;
  selectedHarga = harga;

  document.getElementById("item").innerText = nama;
  document.getElementById("total").innerText = "IDR " + harga;

  let cards = document.querySelectorAll(".diamond-card");
  cards.forEach(card => card.classList.remove("active"));
  event.currentTarget.classList.add("active");
}

function bukaForm(){
  if(!selectedDiamond){
    alert("Pilih diamond dulu!");
    return;
  }
  document.getElementById("formBox").style.display = "block";
}

function kirimWA(){
  let id = document.getElementById("id").value;
  let server = document.getElementById("server").value;
  let nick = document.getElementById("nick").value;

  if(!id || !server || !nick){
    alert("Isi semua data!");
    return;
  }

  let pesan = `Bang gw mau topup ML
Item: ${selectedDiamond}
Harga: IDR ${selectedHarga}
Nickname: ${nick}
ID: ${id}
Server: ${server}`;

  let url = `https://wa.me/6281770220902?text=${encodeURIComponent(pesan)}`;
  window.open(url, '_blank');
}
</script>

</body>
</html>
